<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mortgage Calculator</title>
  <desc id="desc">Preview card for a mortgage calculator with payment totals and an amortization chart.</desc>
  <rect width="1200" height="630" fill="#f4f6f5"/>
  <rect x="70" y="58" width="1060" height="514" rx="24" fill="#ffffff" stroke="#cfdad6" stroke-width="2"/>
  <text x="118" y="142" fill="#173d33" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Mortgage Calculator</text>
  <text x="120" y="194" fill="#596560" font-family="Inter, Arial, sans-serif" font-size="28">Estimate payments, payoff time, and interest saved.</text>

  <rect x="118" y="242" width="296" height="128" rx="16" fill="#173d33"/>
  <text x="144" y="293" fill="#b9d8ce" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Monthly cost</text>
  <text x="144" y="342" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">$2,888.95</text>

  <rect x="450" y="242" width="296" height="128" rx="16" fill="#fafffc" stroke="#a8c4b9" stroke-width="2"/>
  <text x="476" y="293" fill="#596560" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Payoff time</text>
  <text x="476" y="342" fill="#173d33" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">30 years</text>

  <rect x="782" y="242" width="230" height="128" rx="16" fill="#fafffc" stroke="#a8c4b9" stroke-width="2"/>
  <text x="808" y="293" fill="#596560" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Rate</text>
  <text x="808" y="342" fill="#173d33" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">6.43%</text>

  <line x1="126" y1="493" x2="1044" y2="493" stroke="#dce6e2" stroke-width="3"/>
  <line x1="126" y1="424" x2="1044" y2="424" stroke="#edf3f1" stroke-width="2"/>
  <line x1="126" y1="465" x2="1044" y2="465" stroke="#edf3f1" stroke-width="2"/>
  <path d="M126 424 C230 438 315 447 405 454 C520 463 618 474 713 483 C830 494 936 495 1044 496" fill="none" stroke="#476fdf" stroke-width="7" stroke-linecap="round"/>
  <path d="M126 424 C228 440 320 456 410 470 C518 487 620 500 713 510 C824 522 936 526 1044 526" fill="none" stroke="#1f8a5f" stroke-width="7" stroke-linecap="round"/>
  <circle cx="1044" cy="496" r="9" fill="#476fdf"/>
  <circle cx="1044" cy="526" r="9" fill="#1f8a5f"/>

  <text x="120" y="544" fill="#596560" font-family="Inter, Arial, sans-serif" font-size="24">Amortization charts and yearly summary included</text>
</svg>
