name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update mortgage rates"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_1.outputs.page_url || steps.deploy_2.outputs.page_url || steps.deploy_3.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy attempt 1
        id: deploy_1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry 2
        if: ${{ steps.deploy_1.outcome == 'failure' }}
        run: sleep 60
      - name: Deploy attempt 2
        id: deploy_2
        if: ${{ steps.deploy_1.outcome == 'failure' }}
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry 3
        if: ${{ steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure' }}
        run: sleep 60
      - name: Deploy attempt 3
        id: deploy_3
        if: ${{ steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure' }}
        uses: actions/deploy-pages@v5
