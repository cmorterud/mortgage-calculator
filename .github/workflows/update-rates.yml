name: Update mortgage rates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install requests
      - name: Fetch latest mortgage rate
        run: python scripts/update_mortgage_rate.py
      - name: Commit updated rate file
        run: |
          if [ -z "$(git status --porcelain -- public/rates/mortgage30us.json)" ]; then
            echo "Mortgage rate file is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/rates/mortgage30us.json
          git commit -m "Update mortgage rate data"
          git push
